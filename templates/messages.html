<!DOCTYPE html>
<html>

<head>

<title>Messages</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Your Messages</h2>

<table class="table table-bordered">

<thead>

<tr>
<th>Sender</th>
<th>Message</th>
</tr>

</thead>

<tbody>

{% for msg in messages %}

<tr>
<td>{{msg.sender}}</td>
<td>{{msg.message}}</td>
</tr>

{% endfor %}

</tbody>

</table>

<br>

<a href="/dashboard" class="btn btn-primary">
Back to Dashboard
</a>

</div>

</body>

</html>
